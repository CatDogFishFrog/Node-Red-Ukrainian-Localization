<script type="text/html" data-help-name="batch">
    <p>Створює послідовності повідомлень на основі різних правил.</p>
    <h3>Details</h3>
    <p>Існує три режими створення послідовностей повідомлень:</p>
    <dl>
        <dt>Number of messages</dt>
        <dd>групує повідомлення в послідовності заданої довжини. Опція <b>overlap</b>
        визначає, скільки повідомлень в кінці однієї послідовності мають
        повторюватися на початку наступної послідовності.</dd>

        <dt>Time interval</dt>
        <dd>групує повідомлення, що надходять у межах вказаного інтервалу. Якщо в межах
            інтервалу не надходить жодних повідомлень, вузол опціонально може відправити порожнє повідомлення.</dd>

        <dt>Concatenate Sequences</dt>
        <dd>створює послідовність повідомлень шляхом об'єднання вхідних послідовностей. Кожне повідомлення
            повинно мати властивість <code>msg.topic</code> та властивість <code>msg.parts</code>, яка
            ідентифікує його послідовність. Вузол налаштовується списком значень <code>topic</code>
            для ідентифікації порядку об'єднання послідовностей.
        </dd>
    </dl>
    
    <div class="translator-note" style="border-left: 4px solid #17a2b8; padding: 10px; margin: 10px 0; background-color: #f8f9fa;">
        <b>Примітка:</b> Опція <b>overlap</b> у режимі "Number of messages" (Кількість повідомлень) ідеально підходить для створення "ковзних вікон" (rolling windows). Наприклад, якщо ви хочете обчислювати ковзне середнє значення сенсора за останні 5 вимірювань, ви можете налаштувати довжину на 5 і overlap на 4.
    </div>

    <h4>Storing messages</h4>
    <p>Цей вузол буферизує повідомлення внутрішньо, щоб працювати з послідовностями.
       Налаштування середовища виконання <code>nodeMessageBufferMaxLength</code> можна використовувати для обмеження кількості повідомлень, які вузли
       будуть буферизувати.</p>
    <p>Якщо отримано повідомлення із встановленою властивістю <code>msg.reset</code>, буферизовані повідомлення видаляються та не відправляються.</p>
</script>
