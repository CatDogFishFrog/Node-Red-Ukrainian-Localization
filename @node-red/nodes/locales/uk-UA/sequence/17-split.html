<script type="text/html" data-help-name="split">
    <p>Розбиває повідомлення на послідовність повідомлень.</p>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload<span class="property-type">object | string | array | buffer</span></dt>
        <dd>Поведінка вузла визначається типом <code>msg.payload</code>:
            <ul>
                <li><b>string</b>/<b>buffer</b> - повідомлення розбивається з використанням вказаного символу (за замовчуванням: <code>\n</code>), послідовності buffer або на частини фіксованої довжини.</li>
                <li><b>array</b> - повідомлення розбивається або на окремі елементи масиву, або на масиви фіксованої довжини.</li>
                <li><b>object</b> - повідомлення відправляється для кожної пари ключ/значення об'єкта.</li>
            </ul>
        </dd>
    </dl>
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>parts<span class="property-type">object</span></dt>
        <dd>Ця властивість містить інформацію про те, як повідомлення було розбито з
        оригінального повідомлення. Якщо передати це до вузла <b>join</b>, послідовність може бути
        зібрана назад у єдине повідомлення. Властивість має наступні атрибути:
        <ul>
            <li><code>id</code> - ідентифікатор групи повідомлень</li>
            <li><code>index</code> - позиція в межах групи</li>
            <li><code>count</code> - якщо відомо, загальна кількість повідомлень у групі. Дивіться розділ 'streaming mode' нижче.</li>
            <li><code>type</code> - тип повідомлення - string/array/object/buffer</li>
            <li><code>ch</code> - для string або buffer, дані, що використовувалися для розбиття повідомлення, як рядок або масив байтів</li>
            <li><code>key</code> - для object, ключ властивості, з якої було створено це повідомлення. Вузол можна налаштувати так, щоб також копіювати це значення в інші властивості повідомлення, такі як <code>msg.topic</code>.</li>
            <li><code>len</code> - довжина кожного повідомлення при розбитті з використанням фіксованої довжини</li>
        </ul>
        </dd>
    </dl>

    <div class="translator-note" style="border-left: 4px solid #17a2b8; padding: 10px; margin: 10px 0; background-color: #f8f9fa;">
        <b>Примітка:</b> Властивість <code>msg.parts</code> є критично важливою для автоматичної роботи вузла <b>join</b>. Під час маршрутизації або модифікації розбитих повідомлень переконайтеся, що об'єкт <code>msg.parts</code> не втрачається і не перезаписується, інакше ви не зможете коректно об'єднати їх назад.
    </div>

    <h3>Details</h3>
    <p>Цей вузол дозволяє легко створювати flow, які виконують загальні дії над
    послідовністю повідомлень перед тим, як за допомогою вузла <b>join</b> знову об'єднати
    послідовність у єдине повідомлення.</p>
    <p>Він використовує властивість <code>msg.parts</code> для відстеження окремих частин
    послідовності.</p>
    <h4>Streaming mode</h4>
    <p>Вузол також можна використовувати для переформатування потоку повідомлень. Наприклад,
    послідовний пристрій, який надсилає команди, що закінчуються символом нового рядка, може доставити одне повідомлення
    з частковою командою в кінці. У 'streaming mode' (потоковому режимі) цей вузол розіб'є
    повідомлення та відправить кожен завершений сегмент. Якщо в кінці є неповний сегмент,
    вузол збереже його та додасть на початок наступного отриманого повідомлення.
    </p>
    <p>При роботі в цьому режимі вузол не буде встановлювати властивість <code>msg.parts.count</code>,
    оскільки він не знає, скільки повідомлень очікувати в потоці. Це
    означає, що його не можна використовувати з вузлом <b>join</b> у його автоматичному режимі.</p>
</script>

<script type="text/html" data-help-name="join">
    <p>Об'єднує послідовності повідомлень в одне повідомлення.</p>
    <p>Доступні три режими:</p>
    <dl>
        <dt>automatic</dt>
        <dd>При використанні разом із вузлом <b>split</b>, він автоматично об'єднає повідомлення, щоб скасувати виконане розбиття.</dd>
        <dt>manual</dt>
        <dd>Об'єднує послідовності повідомлень різними способами.</dd>
        <dt>reduce sequence</dt>
        <dd>Застосовує вираз до всіх повідомлень у послідовності, щоб звести (reduce) її до одного повідомлення.</dd>
    </dl>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt class="optional">parts<span class="property-type">object</span></dt>
        <dd>Щоб автоматично об'єднати послідовність повідомлень, усі вони повинні мати
        цю встановлену властивість. Вузол <b>split</b> генерує цю властивість, але її
        можна створити вручну. Вона має наступні атрибути:
        <ul>
            <li><code>id</code> - ідентифікатор групи повідомлень</li>
            <li><code>index</code> - позиція в межах групи</li>
            <li><code>count</code> - загальна кількість повідомлень у групі</li>
            <li><code>type</code> - тип повідомлення - string/array/object/buffer</li>
            <li><code>ch</code> - для string або buffer, дані, що використовувалися для розбиття повідомлення, як рядок або масив байтів</li>
            <li><code>key</code> - для object, ключ властивості, з якої було створено це повідомлення</li>
            <li><code>len</code> - довжина кожного повідомлення при розбитті з використанням фіксованої довжини</li>
        </ul>
        </dd>
        <dt class="optional">complete</dt>
        <dd>Якщо встановлено, вузол додасть payload, а потім відправить вихідне повідомлення в його поточному стані.
            Якщо ви не бажаєте додавати payload, видаліть його з msg.</dd>
        <dt class="optional">reset</dt>
        <dd>Якщо встановлено, вузол очистить будь-яке частково зібране повідомлення і не буде його відправляти.</dd>
        <dt class="optional">restartTimeout</dt>
        <dd>Якщо встановлено, і для вузла налаштовано timeout, цей timeout буде перезапущено.</dd>
    </dl>
    
    <div class="translator-note" style="border-left: 4px solid #17a2b8; padding: 10px; margin: 10px 0; background-color: #f8f9fa;">
        <b>Примітка:</b> Використання властивості <code>msg.complete</code> дуже корисне для примусового "зливу" (flush) накопичених даних. Наприклад, якщо ви очікуєте певну кількість повідомлень, але процес перервався, відправка повідомлення з <code>msg.complete = true</code> дозволить виштовхнути вже зібрані дані далі по flow.
    </div>

    <h3>Details</h3>

    <h4>Automatic mode</h4>
    <p>Режим automatic використовує властивість <code>parts</code> вхідних повідомлень, щоб
       визначити, як саме повинна бути об'єднана послідовність. Це дозволяє йому автоматично
       скасовувати дію вузла <b>split</b>.</p>

    <h4>Manual mode</h4>
    <p>При налаштуванні на об'єднання в ручному режимі (manual), вузол здатний об'єднувати послідовності
     повідомлень у декілька різних результатів:</p>
    <ul>
        <li><b>string</b> або <b>buffer</b> - створюється шляхом об'єднання вибраної властивості кожного повідомлення із зазначеними символами об'єднання (join characters) або buffer.</li>
        <li><b>array</b> - створюється шляхом додавання кожної вибраної властивості або всього повідомлення до вихідного масиву.</li>
        <li><b>key/value object</b> - створюється шляхом використання властивості кожного повідомлення для визначення ключа, під яким
        зберігається потрібне значення.</li>
        <li><b>merged object</b> - створюється шляхом злиття (merge) властивостей кожного повідомлення в єдиний об'єкт.</li>
    </ul>
    <p>Інші властивості вихідного повідомлення беруться з останнього отриманого повідомлення перед відправкою результату.</p>
    <p>Можна встановити <i>count</i> (кількість) повідомлень, які потрібно отримати перед генерацією вихідного повідомлення.
    Для виводу типу object, після досягнення цієї кількості, вузол можна налаштувати на відправку повідомлення для кожного наступного отриманого
    повідомлення.</p>
    <p>Можна встановити <i>timeout</i> для ініціювання відправки нового повідомлення, використовуючи те, що було отримано на даний момент.
     Цей timeout можна перезапустити, відправивши повідомлення з встановленою властивістю <code>msg.restartTimeout</code>.</p>
    <p>Якщо отримано повідомлення з встановленою властивістю <code>msg.complete</code>, вихідне повідомлення завершується та відправляється.
    Це скидає будь-які лічильники частин (part counts).</p>
    <p>Якщо отримано повідомлення з встановленою властивістю <code>msg.reset</code>, частково завершене повідомлення видаляється та не відправляється.
    Це скидає будь-які лічильники частин.</p>

    <h4>Reduce Sequence mode</h4>
    <p>При налаштуванні на об'єднання в режимі reduce, до кожного повідомлення в послідовності застосовується вираз,
       а результат акумулюється для створення одного повідомлення.</p>

    <dl class="message-properties">
        <dt>Initial value</dt>
        <dd>Початкове значення накопиченого значення (<code>$A</code>).</dd>
        <dt>Reduce expression</dt>
        <dd>Вираз JSONata, який викликається для кожного повідомлення в послідовності.
            Результат передається до наступного виклику виразу як накопичене значення.
            У виразі можна використовувати такі спеціальні змінні:
            <ul>
                <li><code>$A</code>: накопичене значення, </li>
                <li><code>$I</code>: індекс повідомлення в послідовності, </li>
                <li><code>$N</code>: кількість повідомлень в послідовності.</li>
            </ul>
        </dd>
        <dt>Fix-up expression</dt>
        <dd>Необов'язковий вираз JSONata, який застосовується після того, як вираз reduce
            був застосований до всіх повідомлень у послідовності.
            У виразі можна використовувати такі спеціальні змінні:
            <ul>
                <li><code>$A</code>: накопичене значення, </li>
                <li><code>$N</code>: кількість повідомлень в послідовності.</li>
            </ul>
        </dd>
        <p>За замовчуванням, вираз reduce застосовується по порядку, від першого
           до останнього повідомлення послідовності. За бажанням його можна застосовувати у
           зворотному порядку.</p>
        <p>$N — це кількість повідомлень, які надходять — навіть якщо вони ідентичні.</p>
    </dl>
    <p><b>Example:</b> наступні налаштування, враховуючи послідовність числових значень,
       розраховують середнє значення:
        <ul>
            <li><b>Reduce expression</b>: <code>$A+payload</code></li>
            <li><b>Initial value</b>: <code>0</code></li>
            <li><b>Fix-up expression</b>: <code>$A/$N</code></li>
        </ul>
    </p>
    <h4>Storing messages</h4>
    <p>Цей вузол буферизує повідомлення внутрішньо, щоб працювати з послідовностями.
       Налаштування середовища виконання <code>nodeMessageBufferMaxLength</code> можна використовувати для обмеження кількості повідомлень, які вузли
       будуть буферизувати.</p>
</script>
