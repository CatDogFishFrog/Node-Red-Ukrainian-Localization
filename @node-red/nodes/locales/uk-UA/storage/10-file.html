<script type="text/html" data-help-name="file">
    <p>Записує <code>msg.payload</code> у файл, додаючи в кінець або замінюючи існуючий вміст.
        Альтернативно, може видалити файл.</p>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt class="optional">filename <span class="property-type">string</span></dt>
        <dd>Ім'я файлу для оновлення може бути вказано в конфігурації вузла або як властивість повідомлення. 
            За замовчуванням буде використовуватися <code>msg.filename</code>, але це можна налаштувати у вузлі.
        </dd>
        <dt class="optional">encoding <span class="property-type">string</span></dt>
        <dd>Якщо налаштовано задавати кодування (encoding) через msg, ця необов'язкова властивість може встановити кодування.</dt>
    </dl>
    <h3>Output</h3>
    <p>Після завершення запису вхідне повідомлення відправляється на вихідний порт.</p>
    
    <div class="translator-note" style="border-left: 4px solid #17a2b8; padding: 10px; margin: 10px 0; background-color: #f8f9fa;">
        <b>Примітка щодо продуктивності:</b> Якщо ви записуєте лог-файли або виконуєте дуже часті записи, використання фіксованого імені файлу в конфігурації вузла значно пришвидшить роботу. Якщо ви використовуєте <code>msg.filename</code>, Node-RED буде відкривати і закривати дескриптор файлу під час кожного запису, що створює зайве навантаження на дискову підсистему.
    </div>

    <h3>Details</h3>
    <p>Кожен payload повідомлення буде додано в кінець файлу, за бажанням додаючи
    символ нового рядка (\n) між кожним з них.</p>
    <p>Якщо використовується <code>msg.filename</code>, файл буде закриватися після кожного запису.
    Для найкращої продуктивності використовуйте фіксоване ім'я файлу.</p>
    <p>Вузол можна налаштувати на перезапис усього файлу замість додавання. Наприклад,
    при записі бінарних даних у файл, таких як зображення, слід використовувати цю опцію
    і відключити опцію додавання нового рядка.</p>
    <p>Кодування даних, що записуються у файл, можна вказати зі списку кодувань.</p>
    <p>Альтернативно, цей вузол можна налаштувати на видалення файлу.</p>
</script>

<script type="text/html" data-help-name="file in">
    <p>Читає вміст файлу як рядок або бінарний буфер.</p>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt class="optional">filename <span class="property-type">string</span></dt>
        <dd>Ім'я файлу для читання може бути вказано в конфігурації вузла або як властивість повідомлення. 
            За замовчуванням буде використовуватися <code>msg.filename</code>, але це можна налаштувати у вузлі.
        </dd>
    </dl>
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">string | buffer</span></dt>
        <dd>Вміст файлу як рядок або бінарний буфер.</dd>
        <dt class="optional">filename <span class="property-type">string</span></dt>
        <dd>Якщо не налаштовано у вузлі, ця необов'язкова властивість встановлює ім'я файлу для читання.</dd>
    </dl>
    
    <div class="translator-note" style="border-left: 4px solid #17a2b8; padding: 10px; margin: 10px 0; background-color: #f8f9fa;">
        <b>Примітка:</b> При читанні великих файлів (наприклад, логів на гігабайти) не намагайтеся зчитувати їх повністю у вигляді єдиного рядка, оскільки це призведе до переповнення пам'яті (Out Of Memory). Використовуйте опцію розбиття файлу на рядки (split into lines) або на менші buffer-чанки (buffer chunks). Таким чином, ви будете обробляти потік (stream), що набагато безпечніше для пам'яті.
    </div>

    <h3>Details</h3>
    <p>Ім'я файлу має бути абсолютним шляхом, інакше воно буде відносним до
    робочого каталогу процесу Node-RED.</p>
    <p>В ОС Windows може знадобитися екранування роздільників шляху, наприклад: <code>\\Users\\myUser</code>.</p>
    <p>Опціонально текстовий файл можна розбити на рядки, виводячи по одному повідомленню на рядок, або бінарний файл
    розбити на менші buffer-чанки — розмір чанку залежить від операційної системи, але зазвичай становить 64k (Linux/Mac) або 41k (Windows).</p>
    <p>При розбитті на кілька повідомлень, кожне повідомлення матиме встановлену властивість <code>parts</code>,
    формуючи повну послідовність повідомлень.</p>
    <p>Кодування вхідних даних можна вказати зі списку кодувань, якщо формат виводу — string.</p>
    <p>Помилки повинні перехоплюватися та оброблятися за допомогою вузла Catch.</p>
</script>
