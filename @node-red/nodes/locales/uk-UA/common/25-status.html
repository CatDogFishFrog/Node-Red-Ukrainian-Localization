<script type="text/html" data-help-name="status">
    <p>Звітує про повідомлення статусу від інших вузлів на тій самій вкладці.</p>
    <h3>Виходи</h3>
    <dl class="message-properties">
        <dt>status.text <span class="property-type">string</span></dt>
        <dd>текст статусу.</dd>
        <dt>status.source.type <span class="property-type">string</span></dt>
        <dd>тип вузла, який повідомив статус.</dd>
        <dt>status.source.id <span class="property-type">string</span></dt>
        <dd>ідентифікатор вузла, який повідомив статус.</dd>
        <dt>status.source.name <span class="property-type">string</span></dt>
        <dd>ім'я (якщо встановлено) вузла, який повідомив статус.</dd>
    </dl>
    <h3>Деталі</h3>
   <p>Цей вузол не генерує <code>payload</code>.</p>
   <p>За замовчуванням вузол звітує про статус для всіх вузлів на тій самій вкладці робочої області. Його можна налаштувати на вибіркове звітування про статус для окремих вузлів.</p>

<div class="translator-note" style="border-left: 4px solid #17a2b8; padding: 10px; margin: 10px 0; background-color: #f8f9fa;">
    <strong>Додаткова інформація щодо вузла status:</strong>
    <p>Вузол Status дуже зручний для моніторингу стану підключень. Наприклад, вузол MQTT In змінює свій статус на "connected", "disconnected" або "connecting". За допомогою вузла Status ви можете перехопити ці зміни форми/кольору тексту під вузлом і, якщо статус стає "disconnected", надіслати алерт системному адміністратору.</p>
</div>
</script>
