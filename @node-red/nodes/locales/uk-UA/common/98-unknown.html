<script type="text/html" data-help-name="unknown">
    <p>Цей вузол має тип, невідомий вашій інсталяції Node-RED.</p>
    <h3>Деталі</h3>
    <p><i>Якщо ви розгортаєте (deploy) з вузлом у цьому стані, його конфігурацію буде збережено, але flow не запуститься, доки не буде встановлено відсутній тип.</i></p>
    <p>Використовуйте опцію <code>Menu - Manage Palette</code> для пошуку та встановлення вузлів, або <b>npm install &lt;module&gt;</b> для встановлення будь-яких відсутніх модулів, після чого перезапустіть Node-RED та імпортуйте вузли повторно.</p>
    <p>Можливо, цей тип вузла вже встановлено, але відсутня залежність (dependency). Перевірте журнал запуску Node-RED на наявність повідомлень про помилки, пов'язаних із відсутнім типом вузла.</p>
    <p>В іншому випадку вам слід зв'язатися з автором flow, щоб отримати копію відсутнього типу вузла.</p>

<div class="translator-note" style="border-left: 4px solid #17a2b8; padding: 10px; margin: 10px 0; background-color: #f8f9fa;">
    <strong>Додаткова інформація щодо вузла unknown:</strong>
    <p>Цей пунктирний вузол зазвичай з'являється, коли ви імпортуєте чийсь готовий flow з інтернету (наприклад, у форматі JSON), але у вашій системі не встановлені необхідні додаткові бібліотеки (палітри/palettes). Завжди перевіряйте документацію до імпортованого коду на наявність списку залежностей.</p>
</div>
</script>
