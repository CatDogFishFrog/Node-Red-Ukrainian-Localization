<script type="text/html" data-help-name="trigger">
    <p>При спрацьовуванні може надіслати повідомлення, а потім, опціонально, друге повідомлення, якщо не було подовжено або скинуто.</p>

    <h3>Входи</h3>
    <dl class="message-properties">
        <dt class="optional">delay <span class="property-type">number</span></dt>
        <dd>Встановлює затримку в мілісекундах, яка буде застосована до повідомлення. Ця опція застосовується лише якщо вузол налаштовано на дозвіл повідомленню перевизначати встановлений інтервал затримки за замовчуванням.</dd>
        <dt class="optional">reset</dt>
        <dd>Якщо отримано повідомлення з цією властивістю, будь-який таймаут або повторення, що зараз виконується, буде очищено, і повідомлення не буде викликано.</dd>
    </dl>

    <h3>Деталі</h3>
    <p>Цей вузол можна використовувати для створення таймауту в межах flow. За замовчуванням, коли він отримує повідомлення, він відправляє далі повідомлення з <code>payload</code> рівним <code>1</code>. Потім він чекає 250 мс перед відправкою другого повідомлення з <code>payload</code> рівним <code>0</code>. Це може бути використано, наприклад, для блимання світлодіодом, підключеним до виводу GPIO Raspberry Pi.</p>
    <p>Корисне навантаження (payloads) кожного відправленого повідомлення може бути налаштоване на різні значення, включаючи опцію нічого не відправляти. Наприклад, встановивши початкове повідомлення на <i>nothing</i> (нічого) і вибравши опцію подовження таймера (extend the timer) з кожним отриманим повідомленням, вузол діятиме як сторожовий таймер (watchdog timer); надсилаючи повідомлення лише в тому випадку, якщо нічого не було отримано протягом заданого інтервалу.</p>
    <p>Якщо встановлено тип <i>string</i> (рядок), вузол підтримує синтаксис шаблонів mustache.</p>
    <p>Затримку між надсиланням повідомлень можна перевизначити за допомогою <code>msg.delay</code>, якщо ця опція увімкнена у вузлі. Значення має бути вказано в мілісекундах.</p>
    <p>Якщо вузол отримує повідомлення з властивістю <code>reset</code> або <code>payload</code>, що відповідає налаштованому у вузлі, будь-який таймаут або повторення, які наразі виконуються, буде очищено, і жодне повідомлення не буде ініційовано.</p>
    <p>Вузол можна налаштувати на повторну відправку повідомлення через регулярні інтервали доти, доки він не буде скинутий отриманим повідомленням.</p>
    <p>Опціонально, вузол можна налаштувати на обробку повідомлень так, ніби вони є окремими потоками (streams), використовуючи властивість msg для ідентифікації кожного потоку. За замовчуванням <code>msg.topic</code>.</p>
    <p>Статус вказує на те, що вузол наразі активний. Якщо використовується кілька потоків, статус вказує кількість потоків, що утримуються.</p>

    <div class="translator-note" style="border-left: 4px solid #17a2b8; padding: 10px; margin: 10px 0; background-color: #f8f9fa;">
        <strong>Додаткова інформація щодо вузла trigger:</strong>
        <p>Цей вузол незамінний для систем "розумного дому". Наприклад, він ідеально підходить для створення логіки освітлення з датчиками руху: відправити команду "Увімкнути світло", коли виявлено рух, і надіслати "Вимкнути світло" через 5 хвилин. Кожен новий рух у кімнаті може скидати таймер (опція "extend the delay"), завдяки чому світло не згасне, поки хтось є в кімнаті.</p>
    </div>
</script>
