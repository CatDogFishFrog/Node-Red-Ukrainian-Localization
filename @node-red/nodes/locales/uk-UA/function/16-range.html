<script type="text/html" data-help-name="range">
    <p>Відображає числове значення на інший діапазон.</p>
    <h3>Входи</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">number</span></dt>
        <dd>Payload <i>має</i> бути числом. Будь-що інше спробує бути розпарсеним у число і буде відхилено у разі невдачі.</dd>
    </dl>
    <h3>Виходи</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">number</span></dt>
        <dd>Значення, відображене на новий діапазон.</dd>
    </dl>
    <h3>Деталі</h3>
    <p>Цей вузол лінійно масштабує отримане значення. За замовчуванням результат не обмежується діапазоном, визначеним у вузлі.</p>
    <p><i>Scale and limit to target range</i> (Масштабувати і обмежити цільовим діапазоном) означає, що результат ніколи не буде виходити за межі діапазону, вказаного в цільовому діапазоні.</p>
    <p><i>Scale and wrap within the target range</i> (Масштабувати та циклічно згорнути в межах цільового діапазону) означає, що результат буде циклічно перенесено в межах цільового діапазону.</p>
    <p><i>Scale, but drop if outside input range</i> (Масштабувати, але відкинути, якщо поза вхідним діапазоном) означає, що результат буде масштабовано, але будь-які вхідні дані за межами вхідного діапазону будуть проігноровані (повідомлення не відправиться).</p>
    <p>Наприклад, вхідний сигнал 0 - 10 відображається на 0 - 100.</p>
    <table style="outline-width:#888 solid thin">
        <tr><th width="80px">mode</th><th width="80px">input</th><th width="80px">output</th></tr>
        <tr><td><center>scale</center></td><td><center>12</center></td><td><center>120</center></td></tr>
        <tr><td><center>limit</center></td><td><center>12</center></td><td><center>100</center></td></tr>
        <tr><td><center>wrap</center></td><td><center>12</center></td><td><center>20</center></td></tr>
        <tr><td><center>drop</center></td><td><center>12</center></td><td><center><i>(no output)</i></center></td></tr>
    </table>

    <div class="translator-note" style="border-left: 4px solid #17a2b8; padding: 10px; margin: 10px 0; background-color: #f8f9fa;">
        <strong>Додаткова інформація щодо вузла range:</strong>
        <p>Цей вузол є ідеальним для нормалізації даних від датчиків. Наприклад, якщо ваш аналоговий датчик температури видає сирі значення (RAW data) від 0 до 1023, ви можете автоматично перетворити їх на температурні градуси (наприклад, від -20 до +80) без написання жодного рядка математичного коду у вузлі function.</p>
    </div>
</script>
