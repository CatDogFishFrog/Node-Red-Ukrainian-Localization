<script type="text/html" data-help-name="delay">
    <p>Затримує кожне повідомлення, що проходить через вузол, або обмежує швидкість (rate limit), з якою вони можуть проходити.</p>
    <h3>Входи</h3>
    <dl class="message-properties">
        <dt class="optional">delay <span class="property-type">number</span></dt>
        <dd>Встановлює затримку в мілісекундах, яка буде застосована до повідомлення. Ця опція застосовується лише у тому випадку, якщо вузол налаштовано на дозвіл повідомленню перевизначати встановлений інтервал затримки за замовчуванням.</dd>
        <dt class="optional">rate <span class="property-type">number</span></dt>
        <dd>Встановлює значення швидкості в мілісекундах між повідомленнями. Цей вузол перезаписує існуюче значення швидкості, визначене в конфігурації вузла, коли він отримує повідомлення, яке містить значення <code>msg.rate</code> у мілісекундах. Ця опція застосовується лише якщо вузол налаштовано на дозвіл повідомленню перевизначати налаштований інтервал швидкості.</dd>
        <dt class="optional">reset</dt>
        <dd>Якщо отримане повідомлення має цю властивість, встановлену на будь-яке значення, всі повідомлення в черзі, що утримуються вузлом, очищаються без їх відправки.</dd>
        <dt class="optional">flush</dt>
        <dd>Якщо отримане повідомлення має цю властивість, встановлену на числове значення, тоді така ж кількість повідомлень буде вивільнена негайно. Якщо встановлено будь-який інший тип (наприклад, boolean), тоді всі повідомлення в черзі, що утримуються вузлом, відправляються негайно.</dd>
        <dt class="optional">toFront</dt>
        <dd>Перебуваючи в режимі обмеження швидкості, якщо отримане повідомлення має цю властивість, встановлену на логічне <code>true</code>, тоді повідомлення виштовхується на початок черги і буде вивільнено наступним. Це можна використовувати в комбінації з <code>msg.flush=1</code> для негайної повторної відправки.</dd>
    </dl>
    <h3>Деталі</h3>
    <p>За умови налаштування на затримку повідомлень, інтервал затримки може бути фіксованим значенням, випадковим значенням у діапазоні або динамічно встановлюватися для кожного повідомлення. Кожне повідомлення затримується незалежно від будь-якого іншого повідомлення, базуючись на часі його надходження.</p>
    <p>За умови налаштування на обмеження швидкості повідомлень, їх доставка розподіляється по налаштованому періоду часу. Статус показує кількість повідомлень, що знаходяться в черзі. Вузол може опціонально відкидати проміжні повідомлення по мірі їх надходження.</p>
    <p>Якщо дозволено перевизначення швидкості, нова швидкість буде застосована негайно і залишатиметься чинною, поки не буде змінена знову, поки вузол не буде скинуто або flow не буде перезапущено.</p>
    <p>Обмеження швидкості може бути застосоване до всіх повідомлень, або їх можна групувати відповідно до їх значення <code>msg.topic</code>. При групуванні проміжні повідомлення автоматично відкидаються. Через кожен інтервал часу вузол може вивільняти або найостанніше повідомлення для всіх тем (topics), або вивільняти найостанніше повідомлення для наступної теми.</p>
    <p><b>Примітка</b>: У режимі обмеження швидкості максимальна глибина черги може бути встановлена через властивість у вашому файлі <i>settings.js</i>. Наприклад <code>nodeMessageBufferMaxLength: 1000,</code></p>

    <div class="translator-note" style="border-left: 4px solid #17a2b8; padding: 10px; margin: 10px 0; background-color: #f8f9fa;">
        <strong>Додаткова інформація щодо вузла delay:</strong>
        <p>Режим "Rate Limit" (обмеження швидкості) є вкрай важливим для інтеграції зі сторонніми API (наприклад, Telegram API або публічні погодні сервіси), щоб запобігти блокуванню вашого IP за перевищення ліміту запитів (Error 429 Too Many Requests).</p>
    </div>
</script>
