<script type="text/html" data-help-name="rbe">
    <p>вузол фільтрації (Report By Exception) - пропускає дані далі лише у випадку, якщо payload змінився. Він також може блокувати, якщо зміна не перевищила або проігнорувати, якщо значення змінилося на задану величину (режими Deadband та Narrowband).</p>
    <h3>Входи</h3>
    <dl class="message-properties">
        <dt>payload
            <span class="property-type">number | string | (object)</span>
        </dt>
        <dd>Режим RBE приймає числа, рядки та прості об'єкти. Інші режими вимагають надання числа, яке можна розпарсити.</dd>
        <dt class="optional">topic <span class="property-type">string</span>
        </dt>
        <dd>якщо вказано, функція працюватиме на основі кожної окремої теми (topic). Цю властивість можна встановити в конфігурації.</dd>
        <dt class="optional">reset<span class="property-type">any</span></dt>
        <dd>якщо встановлено, очищає збережене значення для вказаного <code>msg.topic</code>, або для всіх тем, якщо msg.topic не вказано.</dd>
    </dl>
    <h3>Виходи</h3>
    <dl class="message-properties">
        <dt>payload
            <span class="property-type">як у вхідному</span>
        </dt>
        <dd>Якщо вузол спрацював, вивід буде таким самим, як і вхід.</dd>
    </dl>
    <h3>Деталі</h3>
    <p>У режимі RBE цей вузол буде блокувати повідомлення доти, доки <code>msg.payload</code> (або вибрана властивість) не відрізнятиметься від попереднього. За необхідності він може ігнорувати початкове значення, щоб нічого не відправляти при старті.</p>
    <p>Режими <a href="https://en.wikipedia.org/wiki/Deadband" target="_blank">Deadband</a> (Мертва зона) будуть блокувати вхідне значення, <i>за винятком</i> випадків, коли його зміна є більшою або дорівнює &plusmn; розриву діапазону від попереднього значення.</p>
    <p>Режими Narrowband (Вузька смуга) будуть блокувати вхідне значення, <i>якщо</i> його зміна є більшою або дорівнює &plusmn; розриву діапазону від попереднього значення. Це корисно, наприклад, для ігнорування викидів від несправного датчика.</p>
    <p>Як у режимі Deadband, так і в режимі Narrowband вхідне значення має містити число, яке можна розпарсити, і обидва режими також підтримують % - відправляє лише якщо/крім випадків, коли вхідні дані відрізняються більш ніж на x% від початкового значення.</p>
    <p>Як Deadband, так і Narrowband дозволяють порівнювати значення або з попереднім дійсним вихідним значенням, ігноруючи будь-які значення поза діапазоном, або з попереднім вхідним значенням, що скидає задану точку (set point), дозволяючи таким чином поступовий дрейф (у режимі deadband) або ступінчасту зміну (у режимі narrowband).</p>
    <p><b>Примітка:</b> Це працює на основі кожного окремого <code>msg.topic</code>, хоча за бажанням це можна змінити на іншу властивість. Це означає, що один вузол фільтрації може одночасно обробляти декілька різних тем.</p>

    <div class="translator-note" style="border-left: 4px solid #17a2b8; padding: 10px; margin: 10px 0; background-color: #f8f9fa;">
        <strong>Додаткова інформація щодо вузла rbe:</strong>
        <p>Вузол RBE (Report By Exception) є фантастичним інструментом для зменшення мережевого трафіку та навантаження на бази даних. Якщо ваш датчик публікує температуру щосекунди (наприклад, 21.0°C, 21.0°C, 21.1°C), RBE дозволить передавати дані лише тоді, коли вони дійсно змінюються, тим самим ефективно відфільтровуючи шум.</p>
    </div>
</script>
