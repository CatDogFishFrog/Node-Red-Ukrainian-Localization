<script type="text/html" data-help-name="yaml">
    <p>Конвертує YAML відформатований string у його представлення у вигляді JavaScript object та навпаки.</p>
    <h3>Входи (Inputs)</h3>
    <dl class="message-properties">
        <dt>payload<span class="property-type">object | string</span></dt>
        <dd>JavaScript object або YAML string.</dd>
    </dl>
    <h3>Виходи (Outputs)</h3>
    <dl class="message-properties">
        <dt>payload<span class="property-type">object | string</span></dt>
        <dd>
            <ul>
                <li>Якщо на вході YAML string, він намагається розпарсити його у JavaScript object.</li>
                <li>Якщо на вході JavaScript object, він створює YAML string.</li>
            </ul>
        </dd>
    </dl>
    <div class="translator-note" style="border-left: 4px solid #17a2b8; padding: 10px; margin: 10px 0; background-color: #f8f9fa;">
        <strong>Примітка перекладача:</strong> Формат YAML є чудовою альтернативою JSON для файлів конфігурації. Його основна перевага полягає в тому, що він підтримує коментарі та має чистіший, більш читабельний для людини синтаксис (без великої кількості дужок та лапок). Конвертація об'єкта у YAML може бути корисною для експорту даних у зручному текстовому форматі.
    </div>
</script>
