<script type="text/html" data-help-name="websocket in">
    <p>Вхідний вузол WebSocket.</p>
    <p>За замовчуванням, дані, отримані з WebSocket, знаходитимуться у <code>msg.payload</code>.
    Сокет можна налаштувати так, щоб він очікував правильно сформований рядок JSON, у цьому випадку він розпарсить JSON і надішле отриманий об'єкт (object) як усе повідомлення цілком.</p>
</script>

<script type="text/html" data-help-name="websocket out">
    <p>Вихідний вузол WebSocket.</p>
    <p>За замовчуванням, <code>msg.payload</code> буде відправлено через WebSocket. Сокет можна налаштувати на кодування всього об'єкта <code>msg</code> у JSON рядок і відправку його через WebSocket.</p>

    <p>Якщо повідомлення, яке приходить на цей вузол, почалося у вузлі WebSocket In, повідомлення буде відправлено назад тому клієнту, який ініціював flow. В іншому випадку повідомлення буде розіслано (broadcast) всім підключеним клієнтам.</p>
    <p>Якщо ви хочете здійснити розсилку повідомлення, яке почалося з вузла WebSocket In, вам слід видалити властивість <code>msg._session</code> в межах flow.</p>
    <div class="translator-note" style="border-left: 4px solid #17a2b8; padding: 10px; margin: 10px 0; background-color: #f8f9fa;">
        <strong>Примітка перекладача:</strong> Це ключова особливість маршрутизації WebSocket в Node-RED. Властивість <code>msg._session.id</code> містить унікальний ідентифікатор клієнта, який надіслав запит. Використовуючи вузол <code>change</code> для видалення (Delete) <code>msg._session</code>, ви перетворюєте приватну відповідь одному клієнту на широкомовну розсилку (broadcast) усім.
    </div>
</script>

<script type="text/html" data-help-name="websocket-listener">
   <p>Цей конфігураційний вузол створює кінцеву точку сервера WebSocket (WebSocket Server endpoint), використовуючи вказаний шлях.</p>
</script>

<script type="text/html" data-help-name="websocket-client">
   <p>Цей конфігураційний вузол підключає клієнта WebSocket до вказаної URL-адреси.</p>
</script>
