<script type="text/html" data-help-name="http proxy">
    <p>Опції конфігурації для HTTP proxy.</p>

    <h3>Деталі</h3>
    <p>При зверненні до хоста, що знаходиться у списку проігнорованих хостів, proxy використовуватись не буде.</p>
    <div class="translator-note" style="border-left: 4px solid #17a2b8; padding: 10px; margin: 10px 0; background-color: #f8f9fa;">
        <strong>Примітка перекладача:</strong> Це також глобальний конфігураційний вузол. Список проігнорованих хостів (NO_PROXY) дозволяє вказати локальні адреси або специфічні домени, трафік до яких має йти напряму, оминаючи налаштований HTTP proxy сервер.
    </div>
</script>
