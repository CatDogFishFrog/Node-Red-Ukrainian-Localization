<script type="text/html" data-help-name="tls-config">
    <p>Опції конфігурації для TLS з'єднань.</p>
    <div class="translator-note" style="border-left: 4px solid #17a2b8; padding: 10px; margin: 10px 0; background-color: #f8f9fa;">
        <strong>Примітка перекладача:</strong> Вузол <code>tls-config</code> не використовується безпосередньо у робочій області (workspace). Це конфігураційний вузол, який створюється та використовується іншими мережевими вузлами (наприклад, <code>http request</code>, <code>mqtt in/out</code>, <code>websocket</code>) для забезпечення безпечного з'єднання (SSL/TLS). У ньому можна налаштувати сертифікати, приватні ключі та параметри перевірки серверних сертифікатів.
    </div>
</script>
